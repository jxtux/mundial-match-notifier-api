<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mundial Notifier API</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <main class="card">
    <h1>Mundial Notifier</h1>
    <p class="subtitle">
      Consulta una API externa pública y avisa 10 minutos antes.
    </p>

    <section id="matchBox" class="match-box">
      Cargando próximo partido...
    </section>

    <button id="refreshBtn">Actualizar próximo partido</button>
    <button id="directTestBtn" class="success">Notificación directa ahora</button>
    <button id="testBtn" class="secondary">Probar notificación en 1 minuto</button>
    <button id="clearTestBtn" class="danger">Borrar pruebas</button>

    <p class="note">
      Horario mostrado en UTC-5 / America/Lima.
    </p>
  </main>

  <script type="module" src="./popup.js"></script>
</body>
</html>
